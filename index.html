<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training</title>
<style>
:root{
  --bg:#09090C;--surf:#111116;--card:#18181F;--border:#252530;
  --text:#E8E6E0;--muted:#9999AA;--accent:#D4A843;--green:#4DB885;
  --blue:#5B8EE6;--red:#E06060;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bot:env(safe-area-inset-bottom,20px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;
  padding-bottom:calc(var(--safe-bot) + 32px);-webkit-font-smoothing:antialiased}
.hdr{background:var(--surf);border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 10px) 16px 12px;position:sticky;top:0;z-index:99}
.view-tabs{display:flex;gap:6px;margin-bottom:12px}
.vtab{flex:1;text-align:center;font-size:11px;letter-spacing:.1em;font-weight:600;
  text-transform:uppercase;padding:8px;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .15s}
.vtab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.nav-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:16px;
  color:var(--text);-webkit-user-select:none;user-select:none;flex-shrink:0}
.nav-btn:active{background:var(--border)}
.hdr-center{flex:1;text-align:center;padding:0 8px}
.day-eyebrow{font-size:10px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-bottom:2px;min-height:14px}
.day-name{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1}
.day-date{font-size:11px;color:var(--muted);margin-top:2px}
.day-tag{display:inline-block;font-size:10px;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;border:1px solid var(--border);padding:3px 8px;background:var(--card);margin-top:5px}
.day-pills{display:flex;gap:5px;justify-content:center;margin-bottom:10px}
.pill{flex:1;text-align:center;font-size:10px;letter-spacing:.06em;font-weight:600;
  text-transform:uppercase;padding:6px 2px;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .15s}
.pill.today-pill{border-color:var(--accent);color:var(--accent)}
.pill.active-pill{background:var(--accent);color:#000;border-color:var(--accent)}
.week-hdr{text-align:center;margin-bottom:10px}
.week-title{font-size:20px;font-weight:700}
.week-sub{font-size:11px;color:var(--muted);margin-top:3px}
.pb-wrap{height:2px;background:var(--border)}
.pb-fill{height:100%;background:var(--accent);transition:width .35s ease;width:0%}
.pb-txt{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.05em}
.note{margin:14px 16px 0;border-left:2px solid var(--accent);padding:9px 12px;background:rgba(212,168,67,.05)}
.note p{font-size:12px;color:var(--muted);line-height:1.6}
.sec{margin:20px 16px 0}
.sec-lbl{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;padding:0 2px;margin-bottom:8px}
.sec-card{background:var(--card);border:1px solid var(--border);overflow:hidden}
.item{display:flex;align-items:center;gap:14px;padding:13px 16px;
  border-bottom:1px solid var(--border);cursor:pointer;min-height:54px;
  -webkit-user-select:none;user-select:none;transition:background .12s}
.item:last-child{border-bottom:none}
.item:active{background:rgba(255,255,255,.03)}
.item.done{opacity:.42}
.item.done .ilbl{text-decoration:line-through}
.chk{width:22px;height:22px;border:1.5px solid var(--muted);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .18s}
.item[data-t="lift"] .chk{border-color:#6B3030}
.item[data-t="mob"]  .chk{border-color:#6B5420}
.item.done .chk{background:var(--accent);border-color:var(--accent)}
.item[data-t="lift"].done .chk{background:var(--red);border-color:var(--red)}
.item[data-t="other"].done .chk{background:var(--green);border-color:var(--green)}
.chk-mark{display:none;color:#000;font-size:13px;font-weight:700}
.item.done .chk-mark{display:block}
.ibody{flex:1;min-width:0}
.ilbl{font-size:15px;font-weight:500;line-height:1.2}
.imeta{font-size:11px;color:var(--muted);margin-top:2px}
.ibadge{font-size:10px;letter-spacing:.08em;padding:3px 7px;border:1px solid;white-space:nowrap;flex-shrink:0}
.b-lift{color:var(--red);border-color:#6B2020;background:rgba(224,96,96,.06)}
.b-mob{color:var(--accent);border-color:#6B5420;background:rgba(212,168,67,.06)}
.arrow{color:var(--muted);font-size:11px;transition:transform .22s;flex-shrink:0}
.arrow.open{transform:rotate(90deg)}
.mob-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);min-height:54px}
.mob-row:last-child{border-bottom:none}
.mob-cnt{width:28px;height:28px;border:1.5px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:var(--muted);cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .18s}
.mob-cnt.c1{background:var(--accent);border-color:var(--accent);color:#000}
.mob-cnt.c2{background:var(--green);border-color:var(--green);color:#000}
.mob-body{flex:1;min-width:0;cursor:pointer;-webkit-user-select:none;user-select:none}
.mob-lbl{font-size:15px;font-weight:500}
.mob-meta{font-size:11px;color:var(--muted);margin-top:2px}
.panel{background:var(--surf);border-top:1px solid var(--border);
  overflow:hidden;max-height:0;transition:max-height .32s cubic-bezier(.4,0,.2,1)}
.panel.open{max-height:1200px}
.panel-inner{padding:12px 16px 14px}
.plbl{font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:block}
.rrow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;transition:opacity .15s}
.rrow:last-child{border-bottom:none}
.rrow:active{opacity:.6}
.rrow.done{opacity:.38}
.rrow.done .rname{text-decoration:line-through}
.rrow.done .rchk{background:var(--green);border-color:var(--green)}
.rchk{width:18px;height:18px;border:1.5px solid #333344;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-right:10px;transition:all .18s}
.rchk-mark{display:none;color:#000;font-size:11px;font-weight:700;line-height:1}
.rrow.done .rchk-mark{display:block}
.rname{font-size:13px;flex:1}
.rset{font-size:11px;color:var(--accent);text-align:right;padding-left:12px;white-space:nowrap}
.drow{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow .rname{font-size:13px;flex:1}
.mtime{font-size:11px;color:var(--muted);text-align:right;padding-left:12px;white-space:nowrap}
.cgrid{display:grid;gap:8px;padding:12px 16px}
.cgrid.c3{grid-template-columns:1fr 1fr 1fr}
.gcell{border:1.5px solid var(--border);padding:10px 6px;text-align:center;
  cursor:pointer;transition:all .18s;-webkit-user-select:none;user-select:none}
.gcell:active{opacity:.7}
.gcell.done-green{border-color:var(--green);background:rgba(77,184,133,.08)}
.gcell.blank{opacity:.2;cursor:default}
.gcell-main{font-size:14px;font-weight:600;color:var(--muted);line-height:1;margin-bottom:3px;transition:color .18s}
.gcell-sub{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.gcell.done-green .gcell-main{color:var(--green)}
.stand-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px}
.sblk{border:1.5px solid var(--border);padding:10px 6px;text-align:center;
  cursor:pointer;transition:all .18s;-webkit-user-select:none;user-select:none}
.sblk:active{opacity:.7}
.sblk.done{border-color:var(--accent);background:rgba(212,168,67,.08)}
.snum{font-size:20px;font-weight:600;color:var(--muted);line-height:1;margin-bottom:3px;transition:color .18s}
.sblk.done .snum{color:var(--accent)}
.ssub{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.swin{font-size:10px;color:var(--muted);margin-top:3px}
.snack-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s}
.snack-row:last-child{border-bottom:none}
.snack-row:active{background:rgba(255,255,255,.03)}
.snack-name{font-size:15px;font-weight:500;flex:1}
.snack-total{font-size:13px;color:var(--accent);font-weight:600;min-width:36px;text-align:right;margin-right:10px;font-variant-numeric:tabular-nums}
.snack-total.zero{color:var(--muted);font-weight:400}
.snack-chev{font-size:11px;color:var(--muted)}
.snack-rec{font-size:9px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border:1px solid;
  flex-shrink:0;margin-right:8px;text-transform:uppercase}
.snack-rec.great{color:var(--green);border-color:#1A3D2B;background:rgba(77,184,133,.08)}
.snack-rec.light{color:var(--accent);border-color:#6B5420;background:rgba(212,168,67,.06)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:var(--card);
  border-top:1px solid var(--border);padding:0 0 calc(var(--safe-bot) + 8px);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sheet.show{transform:translateY(0)}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.sheet-title{font-size:15px;font-weight:600}
.sheet-sub{font-size:11px;color:var(--accent);margin-top:2px}
.sheet-close{font-size:22px;color:var(--muted);cursor:pointer;padding:4px 8px;line-height:1;-webkit-user-select:none;user-select:none}
.sheet-body{padding:8px 0}
.num-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px}
.num-btn{background:var(--surf);border:1px solid var(--border);color:var(--text);
  font-size:18px;font-weight:600;padding:16px 8px;text-align:center;cursor:pointer;
  transition:all .12s;-webkit-user-select:none;user-select:none}
.num-btn:active{background:var(--accent);color:#000;border-color:var(--accent)}
.undo-row{padding:0 16px 8px}
.undo-btn{width:100%;background:none;border:1px solid var(--border);color:var(--muted);
  font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:11px;cursor:pointer}
.undo-btn:active{color:var(--red);border-color:var(--red)}
.co-row{display:flex;align-items:center;gap:14px;padding:13px 20px;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s}
.co-row:last-child{border-bottom:none}
.co-row:active{background:rgba(255,255,255,.03)}
.co-row.sel{background:rgba(91,142,230,.06)}
.co-chk{width:22px;height:22px;border:1.5px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s}
.co-chk.sel{background:var(--blue);border-color:var(--blue)}
.co-chk-mark{display:none;color:#000;font-size:13px;font-weight:700}
.co-chk.sel .co-chk-mark{display:block}
.co-body{flex:1}
.co-lbl{font-size:15px;font-weight:500}
.co-sub{font-size:11px;color:var(--muted);margin-top:2px}
.wcard{background:var(--card);border:1px solid var(--border);overflow:hidden}
.wrow{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.wrow:last-child{border-bottom:none}
.wilbl{font-size:14px;font-weight:500;flex:1}
.wsub{font-size:11px;color:var(--muted);margin-top:2px}
.wcount{font-size:16px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.wcount.ok{color:var(--green)}
.wtgt{font-size:10px;color:var(--muted);margin-top:1px;text-align:right}
.wbar{height:3px;background:var(--border);margin:8px 16px 12px}
.wbar-fill{height:100%;background:var(--accent);transition:width .4s ease}
.wbar-fill.ok{background:var(--green)}
.wday-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 16px}
.wday-cell{text-align:center}
.wdlbl{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.wdot{width:28px;height:28px;border:1.5px solid var(--border);margin:0 auto;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}
.wdot.hit{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.wdot.miss{border-color:var(--red);color:var(--red)}
.wdot.na{opacity:.3}
.sw-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.sw-row:last-child{border-bottom:none}
.sw-name{font-size:14px;flex:1}
.sw-val{font-size:16px;font-weight:700;color:var(--accent);min-width:48px;text-align:right;font-variant-numeric:tabular-nums}
.sw-val.zero{color:var(--muted);font-weight:400}
/* STRETCH */
.st-set-toggle{display:flex;gap:8px;margin:16px 16px 0}
.st-tog{flex:1;text-align:center;font-size:12px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;padding:10px;border:1.5px solid var(--border);color:var(--muted);
  cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .15s}
.st-tog.active{background:var(--accent);color:#000;border-color:var(--accent)}
.st-list{margin:16px 16px 0;background:var(--card);border:1px solid var(--border)}
.st-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border)}
.st-row:last-child{border-bottom:none}
.st-thumb{width:38px;height:38px;flex-shrink:0;margin-right:10px;opacity:.7}
.st-thumb svg{width:38px;height:38px}
.st-thumb img{max-width:100%;max-height:100%;display:block;margin:0 auto}
.st-name{flex:1;min-width:0}
.st-lbl{font-size:14px;font-weight:500}
.st-note{font-size:10px;color:var(--muted);margin-top:2px}
.st-adj{display:flex;align-items:center}
.st-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surf);color:var(--text);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;transition:background .12s}
.st-btn:active{background:var(--accent);color:#000}
.st-time{font-size:14px;font-weight:600;color:var(--accent);min-width:44px;text-align:center;font-variant-numeric:tabular-nums}
.st-total{margin:12px 16px 0;font-size:11px;color:var(--muted);text-align:center;letter-spacing:.06em;text-transform:uppercase}
.st-actions{display:flex;gap:8px;margin:16px 16px 0}
.st-start{flex:1;background:var(--accent);color:#000;font-size:15px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:16px;border:none;cursor:pointer;
  -webkit-user-select:none;user-select:none;transition:opacity .15s}
.st-start:active{opacity:.8}
.st-icon-btn{width:56px;height:56px;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:22px;color:var(--muted);flex-shrink:0;-webkit-user-select:none;user-select:none}
.st-icon-btn:active{background:var(--border)}
.st-custom{background:rgba(91,142,230,.04)}
.st-remove{color:var(--muted);font-size:16px;border-color:transparent;background:transparent}
.st-remove:active{color:var(--red);background:rgba(224,96,96,.08)}
/* TIMER */
.st-timer{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;
  padding:calc(var(--safe-top) + 12px) 24px calc(var(--safe-bot) + 16px)}
.st-timer-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.st-timer-close{font-size:13px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;-webkit-user-select:none;user-select:none;padding:8px 0}
.st-timer-close:active{color:var(--text)}
.st-progress-txt{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.st-pbar-wrap{height:3px;background:var(--border);margin-bottom:12px;border-radius:2px}
.st-pbar-fill{height:100%;background:var(--accent);transition:width .5s ease;border-radius:2px}
/* Animation container */
#stAnim{display:flex;align-items:center;justify-content:center;height:38vh;max-height:360px;flex-shrink:0;margin-bottom:14px}
#stAnim svg{height:100%;max-height:300px;width:auto;overflow:visible}
#stAnim img{height:100%;width:auto;max-width:90%;display:block;object-fit:contain}
.st-stretch-name{font-size:24px;font-weight:700;letter-spacing:-.02em;line-height:1.15;margin-bottom:4px}
.st-stretch-note{font-size:13px;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;min-height:18px}
.st-stretch-cue{font-size:12px;color:var(--muted);line-height:1.55;flex:1}
.st-countdown{font-size:72px;font-weight:700;letter-spacing:-.04em;text-align:center;
  font-variant-numeric:tabular-nums;line-height:1;margin:16px 0;color:var(--text)}
.st-countdown.ending{color:var(--accent)}
.st-countdown.transition{color:var(--muted);font-size:56px}
.st-transition-lbl{font-size:13px;color:var(--muted);text-align:center;letter-spacing:.1em;
  text-transform:uppercase;margin-top:-12px;margin-bottom:6px}
.st-controls{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:auto}
.st-ctrl{width:64px;height:64px;border:1.5px solid var(--border);background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:22px;-webkit-user-select:none;user-select:none;transition:all .15s}
.st-ctrl:active{background:var(--border)}
.st-ctrl.main{width:76px;height:76px;border-color:var(--accent);font-size:26px}
.st-ctrl.main:active{background:rgba(212,168,67,.15)}
.st-done{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 24px calc(var(--safe-bot) + 40px)}
.st-done-icon{font-size:56px;margin-bottom:20px}
.st-done-title{font-size:28px;font-weight:700;margin-bottom:8px}
.st-done-sub{font-size:15px;color:var(--muted);margin-bottom:40px;text-align:center}
.st-done-btn{background:var(--accent);color:#000;font-size:14px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:16px 48px;cursor:pointer;border:none;
  -webkit-user-select:none;user-select:none}
.reset-wrap{margin:28px 16px 0;display:flex;justify-content:center}
.reset-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  background:none;border:1px solid var(--border);padding:11px 22px;cursor:pointer}
.data-wrap{margin:12px 16px 0;display:flex;justify-content:center;gap:8px}
</style>
</head>
<body>
<div class="hdr">
  <div class="view-tabs">
    <div class="vtab active" id="tabDay"     onclick="setView('day')">Day</div>
    <div class="vtab"        id="tabWeek"    onclick="setView('week')">This Week</div>
    <div class="vtab"        id="tabStretch" onclick="setView('stretch')">Stretch</div>
  </div>
  <div id="dayHdr">
    <div class="hdr-top">
      <div class="nav-btn" onclick="navDay(-1)">&#8592;</div>
      <div class="hdr-center">
        <div class="day-eyebrow" id="dEyebrow">TODAY</div>
        <div class="day-name" id="dName">--</div>
        <div class="day-date" id="dDate">--</div>
        <div class="day-tag"  id="dTag">--</div>
      </div>
      <div class="nav-btn" onclick="navDay(1)">&#8594;</div>
    </div>
    <div class="day-pills" id="dayPills"></div>
  </div>
  <div id="weekHdr" style="display:none">
    <div class="week-hdr"><div class="week-title">This Week</div><div class="week-sub" id="weekRange">--</div></div>

function wbar(v,t){var p=pct(v,t),ok=v>=t;return'<div class="wbar"><div class="wbar-fill'+(ok?' ok':'')+'\" style="width:'+p+'%"></div></div>';}
function weekStats(){var st={wo:0,mob:0,food:0,runs:0,bikes:0,sprints:0,incline:0,hiit:0,stand:0,pdw:0,wdays:[],sbdays:[],snacks:{}};for(var i=0;i<SNACKS.length;i++)st.snacks[SNACKS[i].id]=0;var wdefs=[{dow:1,lbl:'Push'},{dow:2,lbl:'Lower'},{dow:3,lbl:'Pull'},{dow:4,lbl:'Lower'},{dow:5,lbl:'Mix'}];for(var w=0;w<wdefs.length;w++){var ds=loadStateForDow(wdefs[w].dow),hit=!!ds['lift'];if(hit)st.wo++;st.wdays.push({dow:wdefs[w].dow,lbl:wdefs[w].lbl,done:hit});}for(var d=0;d<7;d++){var ds=loadStateForDow(d);if(ds['mob'])st.mob++;if(ds['cron'])st.food++;if(ds['c_run']||ds['c_mill'])st.runs++;if(ds['c_bike'])st.bikes++;if(ds['c_sprt'])st.sprints++;if(ds['c_incl'])st.incline++;if(ds['c_hiit'])st.hiit++;if(d>=1&&d<=5){var sb=0;for(var n=1;n<=3;n++)if(ds['s'+n])sb++;st.stand+=sb;st.sbdays.push({dow:d,count:sb});}if(d>=1&&d<=5&&ds['w_eve'])st.pdw++;for(var si=0;si<SNACKS.length;si++){var sid=SNACKS[si].id;st.snacks[sid]+=(ds[sid]||0);}}return st;}
function renderWeek(){var st=weekStats(),wd=getWeekDates();var rng=MONTHS_S[wd[0].getMonth()]+' '+wd[0].getDate()+' - '+MONTHS_S[wd[6].getMonth()]+' '+wd[6].getDate();document.getElementById('weekRange').textContent=rng;document.getElementById('pbFill').style.width=pct(st.wo,5)+'%';document.getElementById('pbTxt').textContent=st.wo+' / 5 workouts complete';var h='';h+='<div class="sec"><div class="sec-lbl">Workouts</div><div class="wcard"><div class="wday-grid">';for(var w=0;w<st.wdays.length;w++){var d=st.wdays[w],ip=d.dow<=todayDow,dc=d.done?'hit':(!ip?'na':'miss');h+='<div class="wday-cell"><div class="wdlbl">'+DAYS_S[d.dow].slice(0,3)+'</div><div class="wdot '+dc+'">'+(d.done?'&#10003;':(ip?'&#215;':''))+'</div><div class="wdlbl" style="margin-top:4px">'+d.lbl+'</div></div>';}h+='</div>'+wbar(st.wo,5)+'<div class="wrow" style="border-top:1px solid var(--border)"><div style="flex:1"><div class="wilbl">Total</div></div><div style="text-align:right">'+wcnt(st.wo,5)+'</div></div></div></div>';h+='<div class="sec"><div class="sec-lbl">Daily Habits</div><div class="wcard">';var habs=[{lbl:'Floor Mobility',v:st.mob,t:7},{lbl:'Food Logged',v:st.food,t:7}];for(var m=0;m<habs.length;m++){var mn=habs[m],p2=pct(mn.v,mn.t);h+='<div class="wrow"><div style="flex:1"><div class="wilbl">'+mn.lbl+'</div><div style="height:3px;background:var(--border);margin-top:6px"><div style="height:100%;width:'+p2+'%;background:'+(mn.v>=mn.t?'var(--green)':'var(--accent)')+'"></div></div></div><div style="text-align:right;flex-shrink:0;padding-left:12px">'+wcnt(mn.v,mn.t)+'</div></div>';}h+='</div></div>';h+='<div class="sec"><div class="sec-lbl">Cardio</div><div class="wcard"><div class="wrow"><div style="flex:1"><div class="wilbl">Runs</div><div class="wsub">Outdoor + treadmill</div></div><div style="text-align:right">'+wcnt(st.runs,2)+'</div></div>'+wbar(st.runs,2);var extras=[{lbl:'Bike',v:st.bikes},{lbl:'Sprints',v:st.sprints},{lbl:'Incline Walk',v:st.incline},{lbl:'HIIT',v:st.hiit}];for(var ci=0;ci<extras.length;ci++)h+='<div class="wrow"><div class="wilbl">'+extras[ci].lbl+'</div><div class="wcount" style="color:'+(extras[ci].v>0?'var(--accent)':'var(--muted)')+'">'+''+extras[ci].v+'</div></div>';h+='</div></div>';h+='<div class="sec"><div class="sec-lbl">Walks</div><div class="wcard"><div class="wrow"><div style="flex:1"><div class="wilbl">Post-Dinner Walk</div><div class="wsub">Weekdays</div></div><div style="text-align:right">'+wcnt(st.pdw,5)+'</div></div>'+wbar(st.pdw,5)+'</div></div>';h+='<div class="sec"><div class="sec-lbl">Standing Blocks (60 min each)</div><div class="wcard"><div style="display:flex">';for(var sb=0;sb<st.sbdays.length;sb++){var sbd=st.sbdays[sb],sc2=sbd.count>=3?'var(--green)':sbd.count>0?'var(--accent)':'var(--muted)';var br=sb<st.sbdays.length-1?'border-right:1px solid var(--border)':'';h+='<div style="flex:1;text-align:center;padding:10px 4px;'+br+'"><div class="wdlbl">'+DAYS_S[sbd.dow].slice(0,3)+'</div><div style="font-size:16px;font-weight:700;color:'+sc2+'">'+sbd.count+'/3</div></div>';}h+='</div><div class="wrow" style="border-top:1px solid var(--border)"><div class="wilbl">Total blocks</div><div style="text-align:right">'+wcnt(st.stand,15)+'</div></div>'+wbar(st.stand,15)+'</div></div>';h+='<div class="sec"><div class="sec-lbl">Exercise Snacks &mdash; Week Total</div><div class="wcard">';for(var si=0;si<SNACKS.length;si++){var sn=SNACKS[si],sv=st.snacks[sn.id],sc3=sv===0?' zero':'';h+='<div class="sw-row"><span class="sw-name">'+sn.lbl+'</span><span class="sw-val'+sc3+'">'+(sv>0?sv:'--')+'</span></div>';}h+='</div></div>';document.getElementById('root').innerHTML=h;}
function render(){if(viewMode==='week')renderWeek();else if(viewMode==='stretch')renderStretch();else renderDay();}
function cycleMob(id){var n=(state[id]||0)+1;if(n>2)n=0;state[id]=n;save();var el=document.getElementById('mobcnt_'+id);if(el){el.className='mob-cnt '+(n===2?'c2':n===1?'c1':'');el.textContent=n;}var meta=document.getElementById('mobmeta_'+id);if(meta)meta.textContent=n===0?'Tap to count sessions':n===1?'Done once':'Done twice';var pi=document.getElementById('pi_'+id);if(pi)pi.innerHTML=panelInner(n>=2?'full':'floor');updateProgress();}
function toggleItem(id){state[id]=!state[id];save();var it=document.getElementById('it_'+id);if(it)it.classList.toggle('done',!!state[id]);updateProgress();}
function toggleExp(id){state['x_'+id]=!state['x_'+id];save();var pn=document.getElementById('pn_'+id),ar=document.getElementById('ar_'+id);if(pn)pn.classList.toggle('open',!!state['x_'+id]);if(ar)ar.classList.toggle('open',!!state['x_'+id]);}
function toggleRow(key){state[key]=!state[key];save();var el=document.getElementById('rr_'+key);if(el)el.classList.toggle('done',!!state[key]);}
function toggleWalk(id){state[id]=!state[id];save();var el=document.getElementById('gc_'+id);if(el)el.className='gcell'+(state[id]?' done-green':'');updateProgress();}
function toggleStand(n){state['s'+n]=!state['s'+n];save();var el=document.getElementById('sb'+n);if(el)el.classList.toggle('done',!!state['s'+n]);updateProgress();}
function updateProgress(){var sc=S[viewDow],total=0,done=0;for(var i=0;i<sc.sections.length;i++){var sec=sc.sections[i];if(sec.type==='items'){for(var j=0;j<sec.items.length;j++){total++;if(state[sec.items[j].id])done++;}}else if(sec.type==='stand'){total+=3;for(var n=1;n<=3;n++)if(state['s'+n])done++;}else if(sec.type==='walks'){for(var w=0;w<sec.walks.length;w++)if(!sec.walks[w].blank){total++;if(state[sec.walks[w].id])done++;}}}var p=total>0?Math.round(done/total*100):0;document.getElementById('pbFill').style.width=p+'%';document.getElementById('pbTxt').textContent=done+' / '+total+' complete';}
var sheetMode='',activeSnackId='';
function openCardioSheet(){sheetMode='cardio';document.getElementById('shtTitle').textContent='Cardio';document.getElementById('shtSub').textContent='Select all that apply';var h='';for(var i=0;i<CARDIO.length;i++){var c=CARDIO[i],sel=state[c.id];h+='<div class="co-row'+(sel?' sel':'')+'" id="co_'+c.id+'" onclick="toggleCardioOpt(\''+c.id+'\')"><div class="co-chk'+(sel?' sel':'')+'" id="coc_'+c.id+'"><span class="co-chk-mark">&#10003;</span></div><div class="co-body"><div class="co-lbl">'+c.lbl+'</div><div class="co-sub">'+c.sub+'</div></div></div>';}document.getElementById('shtBody').innerHTML=h;document.getElementById('overlay').classList.add('show');document.getElementById('sheet').classList.add('show');}
function toggleCardioOpt(id){state[id]=!state[id];save();var row=document.getElementById('co_'+id),chk=document.getElementById('coc_'+id);if(row)row.className='co-row'+(state[id]?' sel':'');if(chk)chk.className='co-chk'+(state[id]?' sel':'');var logged=[];for(var i=0;i<CARDIO.length;i++)if(state[CARDIO[i].id])logged.push(CARDIO[i].lbl);var sum=document.getElementById('cardio_sum');if(sum)sum.textContent=logged.length>0?logged.join(' + '):'Tap to log';}
function openSnackSheet(id,lbl){sheetMode='snack';activeSnackId=id;document.getElementById('shtTitle').textContent=lbl;document.getElementById('shtSub').textContent=(state[id]||0)+' today';var h='<div class="num-grid">';for(var i=0;i<SNACK_NUMS.length;i++)h+='<div class="num-btn" onclick="snackAdd('+SNACK_NUMS[i]+')">'+SNACK_NUMS[i]+'</div>';h+='</div><div class="undo-row"><button class="undo-btn" onclick="snackUndo()">Undo last</button></div>';document.getElementById('shtBody').innerHTML=h;document.getElementById('overlay').classList.add('show');document.getElementById('sheet').classList.add('show');}
function snackAdd(n){if(!activeSnackId)return;state['_p_'+activeSnackId]=state[activeSnackId]||0;state[activeSnackId]=(state[activeSnackId]||0)+n;save();document.getElementById('shtSub').textContent=state[activeSnackId]+' today';var el=document.getElementById('snt_'+activeSnackId);if(el){var v=state[activeSnackId];el.textContent=v>0?v:'--';el.className='snack-total'+(v===0?' zero':'');}closeSheet();}
function snackUndo(){if(!activeSnackId)return;var p=state['_p_'+activeSnackId];if(p!==undefined){state[activeSnackId]=p;save();}document.getElementById('shtSub').textContent=(state[activeSnackId]||0)+' today';}
function closeSheet(){document.getElementById('overlay').classList.remove('show');document.getElementById('sheet').classList.remove('show');if(sheetMode==='cardio'){var secs=document.querySelectorAll('.sec');for(var i=0;i<secs.length;i++){var lbl=secs[i].querySelector('.sec-lbl');if(lbl&&lbl.textContent==='CARDIO'){secs[i].querySelector('.sec-card').innerHTML=cardioRowHTML();break;}}}sheetMode='';activeSnackId='';}
var resetOk=false;
function doReset(){var btn=document.getElementById('resetBtn');if(resetOk){state={};save();resetOk=false;render();btn.textContent='Reset Day';btn.style.color='';btn.style.borderColor='';}else{resetOk=true;btn.textContent='Tap again to confirm';btn.style.color='#E06060';btn.style.borderColor='#E06060';setTimeout(function(){if(resetOk){resetOk=false;btn.textContent='Reset Day';btn.style.color='';btn.style.borderColor='';}},3000);}}
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'&&stInterval)acquireWakeLock();});
/* ── DATA BACKUP ──────────────────────────────────────── */
function isBackupKey(k){return k&&(k.indexOf('tr_')===0||k==='custom_stretches'||k.indexOf('active_')===0||k==='stretch_times');}
function collectBackup(){var data={};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(isBackupKey(k))data[k]=localStorage.getItem(k);}return{app:'Training',version:1,exported:new Date().toISOString(),data:data};}
function backupName(){var d=new Date();function p(n){return(n<10?'0':'')+n;}return'training-backup-'+d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'.json';}
function fallbackDownload(blob,fname){try{var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);}catch(e){alert('Export failed on this device.');}}
function exportData(){var b=collectBackup();var n=0;for(var k in b.data)if(b.data.hasOwnProperty(k))n++;var payload=JSON.stringify(b,null,2);var fname=backupName();var blob=new Blob([payload],{type:'application/json'});try{var file=new File([blob],fname,{type:'application/json'});if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Training Backup'}).catch(function(){fallbackDownload(blob,fname);});return;}}catch(e){}fallbackDownload(blob,fname);}
function importData(){var inp=document.getElementById('importFile');if(inp){inp.value='';inp.click();}}
function handleImportFile(inp){var f=inp.files&&inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var obj=JSON.parse(r.result);var d=(obj&&obj.data)?obj.data:obj;if(!d||typeof d!=='object'){alert('Not a valid backup file.');return;}var keys=[];for(var k in d){if(d.hasOwnProperty(k)&&isBackupKey(k))keys.push(k);}if(keys.length===0){alert('No training data found in that file.');return;}if(!confirm('Restore '+keys.length+' entries? This overwrites any matching days currently on this device.'))return;var ok=0;for(var i=0;i<keys.length;i++){try{localStorage.setItem(keys[i],d[keys[i]]);ok++;}catch(e){}}loadState();render();alert('Restored '+ok+' of '+keys.length+' entries.');}catch(e){alert('Could not read that backup file.');}};r.readAsText(f);}
loadState();render();
